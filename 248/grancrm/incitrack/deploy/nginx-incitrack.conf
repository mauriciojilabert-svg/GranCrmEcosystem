# REVIEWABLE — apply to /home/admincrm/gateway/nginx.conf by hand;
# remoteEntry served by existing /mf/ block; run `nginx -t` before reload.
#
# Replace the existing single `location /incitrack/ { ... }` block in
# nginx.conf with the four blocks below. Insert them in the same position
# (after the callreviews blocks and before /assets/).
#
# NOTE: nginx longest-prefix match ensures /incitrack/api/, /incitrack/admin/,
# and /incitrack/media/ are matched before the catch-all /incitrack/ block.

    # incitrack: API → Django backend
    location /incitrack/api/ {
      proxy_pass http://127.0.0.1:8000/incitrack/api/;
      proxy_hide_header X-Frame-Options;
      add_header Content-Security-Policy "frame-ancestors 'self'" always;
    }

    # incitrack: Django admin → backend
    location /incitrack/admin/ {
      proxy_pass http://127.0.0.1:8000/incitrack/admin/;
    }

    # incitrack: media files → backend
    location /incitrack/media/ {
      proxy_pass http://127.0.0.1:8000/incitrack/media/;
    }

    # incitrack: SPA catch-all → shell index.html (Module Federation)
    location /incitrack/ {
      root /home/admincrm/staticfiles/shell;
      try_files /index.html =404;
      add_header Cache-Control "no-store" always;
    }
