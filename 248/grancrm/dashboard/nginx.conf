server {
    listen 80;
    server_name _;

    # Archivos estáticos del dashboard
    root /usr/share/nginx/html;
    index index.html;

    # MCP Server
    location /api/ {
        proxy_pass http://172.20.21.248:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location /health {
        proxy_pass http://172.20.21.248:3001;
        proxy_set_header Host $host;
    }

    # ── InciTrack Módulo (Django / Gunicorn en :8000) ──────────────────────
    location /incitrack/ {
        proxy_pass http://172.20.21.248:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Media files de InciTrack (adjuntos de tickets)
    location /incitrack/media/ {
        alias /home/admincrm/grancrm/incitrack/media/;
        expires 7d;
        add_header Cache-Control "public";
    }
}
