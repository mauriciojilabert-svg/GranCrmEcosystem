services:

  dashboard:
    build:
      context: .
      dockerfile: docker/Dockerfile.dashboard
    container_name: grancrm-dashboard
    ports:
      - "3002:80"
    restart: unless-stopped

  incitrack-modulo:
    build:
      context: ./incitrack
      dockerfile: Dockerfile
    container_name: grancrm-incitrack
    network_mode: host
    restart: unless-stopped
    environment:
      - DJANGO_SETTINGS_MODULE=incitrack.settings
    env_file:
      - ./incitrack/.env
    volumes:
      - ./incitrack/media:/app/media
      - ./incitrack/tickets/templates:/app/tickets/templates
      - ./incitrack/incitrack/settings.py:/app/incitrack/settings.py
      - ./incitrack/incitrack/urls.py:/app/incitrack/urls.py
      - ./incitrack/tickets/grancrm_session.py:/app/tickets/grancrm_session.py
      - ./incitrack/tickets/api.py:/app/tickets/api.py
      - ./incitrack/tickets/email_service.py:/app/tickets/email_service.py
      - "/home/admincrm/orquestador/plantilla duralux/duralux-admin/assets:/app/assets:ro"
      - ./incitrack/dios.json:/app/dios.json:ro
