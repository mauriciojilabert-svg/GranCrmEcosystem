<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Iniciar Sesión — InciTrack</title>
    <link rel="stylesheet" href="/assets/css/bootstrap.min.css" />
    <link rel="stylesheet" href="/assets/vendors/css/vendors.min.css" />
    <link rel="stylesheet" href="/assets/css/theme.min.css" />
</head>
<body class="bg-light">

<div class="auth-main">
    <div class="auth-wrapper v1">
        <div class="auth-form">
            <div class="card my-5">
                <div class="card-body">
                    <div class="text-center mb-4">
                        <img src="/assets/images/logo-full.png" alt="GranCRM" style="max-height:48px;" onerror="this.style.display='none'">
                        <h4 class="mt-3 mb-1 fw-bold text-dark">InciTrack</h4>
                        <p class="text-muted fs-13">Sistema de Gestión de Incidencias</p>
                    </div>

                    {% if form.errors %}
                    <div class="alert alert-danger">
                        <i class="feather-alert-circle me-2"></i>
                        Credenciales incorrectas. Verifica tu email y contraseña.
                    </div>
                    {% endif %}

                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Email</label>
                            <input type="email" name="username" class="form-control"
                                   placeholder="tu@correo.cl" autofocus required
                                   value="{{ form.username.value|default:'' }}" />
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Contraseña</label>
                            <input type="password" name="password" class="form-control"
                                   placeholder="••••••••" required />
                        </div>
                        <input type="hidden" name="next" value="{{ next }}" />
                        <div class="d-grid mt-4">
                            <button type="submit" class="btn btn-primary">
                                <i class="feather-log-in me-2"></i>Ingresar
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="/assets/vendors/js/vendors.min.js"></script>
<script src="/assets/js/common-init.min.js"></script>
</body>
</html>
